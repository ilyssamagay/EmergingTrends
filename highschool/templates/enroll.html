<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Enrollment Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 p-4">

    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-8">
        
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">
            Enrollment Form
        </h1>

        <form method="post" class="space-y-5">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    First Name
                </label>
                <input type="text" name="firstname" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Last Name
                </label>
                <input type="text" name="lastname" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Age
                </label>
                <input type="number" name="age" min="0" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Gender
                </label>
                <select name="gender" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition">
                    <option value="">Select gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <button type="submit"
                class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-semibold hover:bg-indigo-700 active:scale-[0.98] transition duration-200 shadow-md">
                Submit
            </button>
        </form>

        {% if submitted %}
        <div class="mt-8 p-5 bg-indigo-50 rounded-xl border border-indigo-200">
            <h2 class="text-lg font-semibold text-indigo-700 mb-3">
                Submission Details
            </h2>
            <ul class="space-y-1 text-gray-700 text-sm">
                <li><strong>First name:</strong> {{ firstname }}</li>
                <li><strong>Last name:</strong> {{ lastname }}</li>
                <li><strong>Age:</strong> {{ age }}</li>
                <li><strong>Gender:</strong> {{ gender }}</li>
            </ul>
        </div>
        {% endif %}

    </div>

</body>
</html>
