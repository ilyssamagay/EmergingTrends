<!DOCTYPE html>

<html>

<head>
    <meta charset="utf-8" />
    <title>Enrollment Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body
    class="min-h-screen flex items-center justify-center bg-[radial-gradient(circle_at_top_left,_var(--tw-gradient-stops))] from-emerald-900 via-green-950 to-black p-6">
    <div
        class="bg-white/10 backdrop-blur-xl w-full max-w-md rounded-3xl border border-white/20 shadow-[0_8px_32px_0_rgba(0,0,0,0.37)] p-10">
        <h1 class="text-4xl font-extrabold text-center text-white mb-8 tracking-tight">
            Enrollment Form
        </h1>
        <form class="space-y-5" method="post">
            {% csrf_token %}

            <div>
                <label class="block text-xs font-semibold text-emerald-100 uppercase tracking-widest mb-2 ml-1">
                    First Name
                </label>
                <input
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-emerald-200/50 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500/50 transition-all duration-300"
                    name="firstname" required="" type="text" />
            </div>
            <div>
                <label class="block text-xs font-semibold text-emerald-100 uppercase tracking-widest mb-2 ml-1">
                    Last Name
                </label>
                <input
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-emerald-200/50 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500/50 transition-all duration-300"
                    name="lastname" required="" type="text" />
            </div>
            <div>
                <label class="block text-xs font-semibold text-emerald-100 uppercase tracking-widest mb-2 ml-1">
                    Age
                </label>
                <input
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-emerald-200/50 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500/50 transition-all duration-300"
                    min="0" name="age" required="" type="number" />
            </div>
            <div>
                <label class="block text-xs font-semibold text-emerald-100 uppercase tracking-widest mb-2 ml-1">
                    Gender
                </label>
                <select
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-emerald-100 placeholder-emerald-200/50 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500/50 transition-all duration-300"
                    name="gender" required="">
                    <option class ="text-black" value="">Select gender</option>
                    <option class ="text-black" value="male">Male</option>
                    <option class ="text-black" value="female">Female</option>
                    <option class ="text-black" value="other">Other</option>
                </select>
            </div>
            <button
                class="w-full bg-gradient-to-r from-emerald-500 to-green-600 text-white py-3.5 rounded-xl font-bold hover:from-emerald-400 hover:to-green-500 active:scale-[0.97] transition-all duration-300 shadow-[0_0_20px_rgba(16,185,129,0.4)] hover:shadow-[0_0_25px_rgba(16,185,129,0.6)] mt-4"
                type="submit">
                Submit
            </button>
        </form>

        {% if submitted %}
        <div class="mt-10 p-6 bg-emerald-500/10 backdrop-blur-md rounded-2xl border border-emerald-500/20">
            <h2 class="text-lg font-bold text-emerald-400 mb-4 flex items-center gap-2"><span
                    class="material-symbols-outlined text-emerald-400">verified_user</span>
                Submission Details
            </h2>
            <ul class="space-y-2 text-emerald-50/90 text-sm">
                <li><strong class="text-emerald-300 font-medium">First name:</strong> {{ firstname }}</li>
                <li><strong class="text-emerald-300 font-medium">Last name:</strong> {{ lastname }}</li>
                <li><strong class="text-emerald-300 font-medium">Age:</strong> {{ age }}</li>
                <li><strong class="text-emerald-300 font-medium">Gender:</strong> {{ gender }}</li>
            </ul>
        </div>
        {% endif %}

    </div>
</body>

</html>
